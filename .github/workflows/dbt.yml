name: dbt-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dbt:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: .
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Install dbt dependencies
        run: dbt deps

      - name: Create service account key file
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}" > /tmp/gcp-key.json

      - name: Create dbt profile
        run: |
          cat > profiles.yml <<EOF
          dbt_bch_pipeline:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${GCP_PROJECT_ID}
                dataset: bch_staging
                threads: 4
                timeout_seconds: 300
                location: US
                keyfile: /tmp/gcp-key.json
                priority: interactive
          EOF

      - name: Run dbt debug
        run: dbt debug --profiles-dir .

      - name: Run dbt build
        run: dbt run --profiles-dir .